# /etc/nginx/sites-available/dolanan.conf
# Enable with:  ln -s /etc/nginx/sites-available/dolanan.conf /etc/nginx/sites-enabled/
# Reload with:  sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name dolanan.lori.my.id;

    root /var/www/dolanan;
    index index.html;

    # Compression
    gzip on;
    gzip_comp_level 6;
    gzip_types text/html text/css application/javascript image/svg+xml application/json application/manifest+json;

    # Long cache for static assets
    location ~* \.(?:jpg|jpeg|png|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Hashed JS/CSS can be cached aggressively; plain ones stay short
    location ~* \.(?:js|css)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Service worker MUST bypass cache so updates ship immediately
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Manifest: short cache so icon swaps propagate
    location = /manifest.webmanifest {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Block dotfiles (.git, .env, .gitignore, etc.)
    location ~ /\. { deny all; access_log off; log_not_found off; }

    # Block dev-only folders even if they end up in the deploy tree
    location ~* /(node_modules|scripts|__pycache__)/ { deny all; return 404; }
    location ~* /(package\.json|package-lock\.json|future\.md)$ { deny all; return 404; }

    # SPA-ish fallback not needed — each game is a real path. Just 404 otherwise.
    location / { try_files $uri $uri/ =404; }
}

