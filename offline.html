<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3b82f6" />
    <title>Offline — Dolanan</title>
    <script>
      (function () {
        try {
          var v = localStorage.getItem("dolanan:theme");
          var d = v && JSON.parse(v) === "dark";
          document.documentElement.setAttribute("data-theme", d ? "dark" : "light");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <link rel="stylesheet" href="/style.css" />
    <style>
      .offline-shell {
        max-width: 480px;
        margin: 80px auto;
        text-align: center;
      }
      .offline-emoji {
        font-size: 72px;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <main class="offline-shell">
      <div class="offline-emoji" aria-hidden="true">📡</div>
      <h1 class="logo">Dolanan</h1>
      <p>You're offline and this page isn't cached yet.</p>
      <p>
        <a class="btn btn-primary" href="/">← Back to hub</a>
      </p>
    </main>
  </body>
</html>
