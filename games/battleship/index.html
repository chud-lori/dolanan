<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <title>Battleship — Dolanan</title>
    <meta name="description" content="Play Battleship offline in hotseat. Place your fleet, pass the phone, and sink your opponent's ships." />
    <link rel="canonical" href="https://dolanan.lori.my.id/games/battleship/" />
    <meta property="og:title" content="Battleship — Dolanan" />
    <meta property="og:description" content="Offline 2-player hotseat Battleship." />
    <meta property="og:image" content="https://dolanan.lori.my.id/og/battleship.png" />
    <meta property="og:url" content="https://dolanan.lori.my.id/games/battleship/" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      (function () {
        try {
          var v = localStorage.getItem("dolanan:theme");
          var d = v && JSON.parse(v) === "dark";
          document.documentElement.setAttribute("data-theme", d ? "dark" : "light");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/shared/ui.css" />
    <link rel="stylesheet" href="./game.css" />
    <script type="module" src="./game.js" defer></script>
  </head>
  <body>
    <a class="back-link" href="/" data-i18n="nav.back">← Back</a>

    <main class="game-shell">
      <header class="game-header">
        <div>
          <h1 class="game-title">Battleship</h1>
          <p class="game-subtitle"></p>
        </div>
      </header>

      <section id="bs-root" class="bs-root"></section>

      <div class="row" style="justify-content: center; margin-top: 16px;">
        <button id="reset" type="button" class="btn btn-ghost" data-i18n="btn.newGame">New game</button>
      </div>
    </main>

  </body>
</html>
