<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <title>Dots &amp; Boxes — Dolanan</title>
    <meta name="description" content="Play Dots and Boxes offline for two. Draw edges, complete squares to claim them, bonus turn on completion." />
    <link rel="canonical" href="https://dolanan.lori.my.id/games/dots-and-boxes/" />
    <meta property="og:title" content="Dots and Boxes — Dolanan" />
    <meta property="og:description" content="Offline 2-player Dots and Boxes." />
    <meta property="og:image" content="https://dolanan.lori.my.id/og-image.png" />
    <meta property="og:url" content="https://dolanan.lori.my.id/games/dots-and-boxes/" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/shared/ui.css" />
    <link rel="stylesheet" href="./game.css" />
    <script type="module" src="./game.js" defer></script>
  </head>
  <body>
    <a class="back-link" href="/" data-i18n="nav.back">← Back</a>

    <main class="game-shell">
      <header class="game-header">
        <div>
          <h1 class="game-title">Dots &amp; Boxes</h1>
          <p class="game-subtitle"></p>
        </div>
        <div id="turn-pill" class="turn-pill">
          <span class="turn-dot blue"></span>
          <span id="turn-label"></span>
        </div>
      </header>

      <div class="score-strip" aria-label="Score">
        <div class="score"><span class="label" data-i18n="db.p1">Blue</span><span id="score-1" class="value">0</span></div>
        <div class="score"><span class="label" data-i18n="db.p2">Orange</span><span id="score-2" class="value">0</span></div>
      </div>

      <div class="board-wrap">
        <svg id="board" class="db-board" viewBox="0 0 100 100" aria-label="Dots and Boxes board"></svg>
      </div>

      <div id="status" class="status-banner" hidden></div>

      <div class="row" style="justify-content: center; margin-top: 16px;">
        <button id="size-btn" type="button" class="btn btn-ghost">6 × 6</button>
        <button id="reset" type="button" class="btn btn-primary" data-i18n="btn.newRound">New round</button>
      </div>
    </main>

    <footer class="app-footer">
      <span data-i18n="credit.by">Created by</span>
      <a href="https://profile.lori.my.id" rel="noopener">Lori</a>
    </footer>
  </body>
</html>
