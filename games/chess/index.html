<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <title>Chess — Dolanan</title>
    <meta name="description" content="Play Chess for two, offline. Full rules: castling, en passant, pawn promotion, check, checkmate, stalemate." />
    <link rel="canonical" href="https://dolanan.lori.my.id/games/chess/" />
    <meta property="og:title" content="Chess — Dolanan" />
    <meta property="og:description" content="Offline 2-player chess with full rules." />
    <meta property="og:image" content="https://dolanan.lori.my.id/og/chess.png" />
    <meta property="og:url" content="https://dolanan.lori.my.id/games/chess/" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/shared/ui.css" />
    <link rel="stylesheet" href="./game.css" />
    <script type="module" src="./game.js" defer></script>
  </head>
  <body>
    <a class="back-link" href="/" data-i18n="nav.back">← Back</a>

    <main class="game-shell">
      <header class="game-header">
        <div>
          <h1 class="game-title">Chess</h1>
          <p class="game-subtitle"></p>
        </div>
        <div id="turn-pill" class="turn-pill">
          <span class="turn-dot white"></span>
          <span id="turn-label"></span>
        </div>
      </header>

      <!-- Setup: choose mode before game starts -->
      <div id="ch-setup" class="card" style="text-align: center;">
        <h2 data-i18n="ch.chooseMode">Choose mode</h2>
        <div class="row" style="justify-content: center; margin: 16px 0;">
          <button type="button" class="btn btn-primary" data-mode="human" style="min-width: 120px;">
            👥 <span data-i18n="ch.modeHuman">2 Players</span>
          </button>
          <button type="button" class="btn btn-secondary" id="btn-pick-bot" style="min-width: 120px;">
            🤖 <span data-i18n="ch.modeBot">vs Bot</span>
          </button>
        </div>
        <div id="diff-row" hidden style="margin-top: 12px;">
          <div class="ch-setup-label" data-i18n="ch.difficulty">Difficulty</div>
          <div class="lang-seg" id="diff-seg" style="margin-bottom: 12px;">
            <button type="button" data-diff="easy" data-i18n="ch.easy">Easy</button>
            <button type="button" data-diff="medium" class="active" data-i18n="ch.medium">Medium</button>
            <button type="button" data-diff="hard" data-i18n="ch.hard">Hard</button>
          </div>
          <div class="ch-setup-label" data-i18n="ch.playAs">Play as</div>
          <div class="lang-seg" id="color-seg" style="margin-bottom: 12px;">
            <button type="button" data-color="w" class="active" data-i18n="ch.colorWhite">White</button>
            <button type="button" data-color="b" data-i18n="ch.colorBlack">Black</button>
            <button type="button" data-color="r" data-i18n="ch.colorRandom">Random</button>
          </div>
          <button type="button" class="btn btn-primary" id="btn-start-bot" style="width: 100%;" data-i18n="btn.start">Start</button>
        </div>
      </div>

      <!-- Game area: hidden until mode is chosen -->
      <div id="ch-play" hidden>
        <!-- Pieces captured by white (shown above board when not flipped) -->
        <div id="captured-top" class="ch-captured" aria-label="Captured pieces"></div>

        <div class="board-wrap">
          <div id="board" class="ch-board" aria-label="Chess board"></div>
        </div>

        <!-- Pieces captured by the player on the near side -->
        <div id="captured-bottom" class="ch-captured" aria-label="Captured pieces"></div>

        <div id="status" class="status-banner" hidden></div>

        <div class="row" style="justify-content: center; margin-top: 10px; gap: 6px; flex-wrap: wrap;">
          <button id="flip" type="button" class="btn btn-secondary ch-action" data-i18n="ch.flip">Flip</button>
          <button id="undo" type="button" class="btn btn-secondary ch-action" data-i18n="btn.undo">↶ Undo</button>
          <button id="draw-btn" type="button" class="btn btn-secondary ch-action" data-i18n="ch.draw">Draw</button>
          <button id="resign" type="button" class="btn btn-secondary ch-action" data-i18n="ch.resign">Resign</button>
          <button id="reset" type="button" class="btn btn-primary ch-action" data-i18n="btn.newGame">New game</button>
        </div>
      </div>
    </main>

    <div id="promo" class="modal-backdrop" hidden>
      <div class="modal">
        <h2 id="promo-title">Promote pawn</h2>
        <div class="modal-actions" id="promo-choices"></div>
      </div>
    </div>

  </body>
</html>
