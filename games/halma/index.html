<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <title>Halma — Dolanan</title>
    <meta name="description" content="Play Halma offline for two. Move pieces by stepping or jumping; first to fill the opponent's corner wins." />
    <link rel="canonical" href="https://dolanan.lori.my.id/games/halma/" />
    <meta property="og:title" content="Halma — Dolanan" />
    <meta property="og:description" content="Offline 2-player Halma — step + jump strategy." />
    <meta property="og:image" content="https://dolanan.lori.my.id/og/halma.png" />
    <meta property="og:url" content="https://dolanan.lori.my.id/games/halma/" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      (function () {
        try {
          var v = localStorage.getItem("dolanan:theme");
          var d = v && JSON.parse(v) === "dark";
          document.documentElement.setAttribute("data-theme", d ? "dark" : "light");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/shared/ui.css" />
    <link rel="stylesheet" href="./game.css" />
    <script type="module" src="./game.js" defer></script>
  </head>
  <body>
    <a class="back-link" href="/" data-i18n="nav.back">← Back</a>

    <main class="game-shell">
      <header class="game-header">
        <div>
          <h1 class="game-title">Halma</h1>
          <p class="game-subtitle"></p>
        </div>
        <div id="turn-pill" class="turn-pill" hidden>
          <span class="turn-dot red"></span>
          <span id="turn-label"></span>
        </div>
      </header>

      <div id="setup" class="card" style="text-align: center;">
        <h2 data-i18n="hl.pickVariant">Pick a variant</h2>
        <div class="row" style="justify-content: center; flex-direction: column; gap: 12px;">
          <button class="btn btn-primary" data-variant="classical" data-n="2" data-i18n="hl.classical2">Classical · 2 players</button>
          <div style="height: 8px;"></div>
          <div class="game-subtitle" data-i18n="hl.starHeading" style="margin: 0;">Star (Indonesian)</div>
          <div class="row" style="justify-content: center; gap: 8px; flex-wrap: wrap;">
            <button class="btn btn-primary" data-variant="star" data-n="2">2</button>
            <button class="btn btn-primary" data-variant="star" data-n="3">3</button>
            <button class="btn btn-primary" data-variant="star" data-n="4">4</button>
            <button class="btn btn-primary" data-variant="star" data-n="6">6</button>
          </div>
        </div>
      </div>

      <div id="play" hidden>
        <div class="board-wrap">
          <div id="board" class="hl-board" aria-label="Halma board"></div>
        </div>

        <div id="status" class="status-banner" hidden></div>

        <div class="row" style="justify-content: center; margin-top: 12px;">
          <button id="end-jump" type="button" class="btn btn-secondary" hidden data-i18n="hl.endJump">End jump</button>
          <button id="reset" type="button" class="btn btn-primary" data-i18n="btn.newGame">New game</button>
        </div>
      </div>
    </main>
  </body>
</html>
