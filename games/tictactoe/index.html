<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <title>Tic-Tac-Toe — Dolanan</title>
    <meta name="description" content="Play Tic-Tac-Toe for two, offline. Part of Dolanan — a hub of casual party games." />
    <link rel="canonical" href="https://dolanan.lori.my.id/games/tictactoe/" />
    <meta property="og:title" content="Tic-Tac-Toe — Dolanan" />
    <meta property="og:description" content="Offline 2-player Tic-Tac-Toe in your browser." />
    <meta property="og:image" content="https://dolanan.lori.my.id/og/tictactoe.png" />
    <meta property="og:url" content="https://dolanan.lori.my.id/games/tictactoe/" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/shared/ui.css" />
    <link rel="stylesheet" href="./game.css" />
    <script type="module" src="./game.js" defer></script>
  </head>
  <body>
    <a class="back-link" href="/" data-i18n="nav.back">← Back</a>

    <main class="game-shell">
      <header class="game-header">
        <div>
          <h1 class="game-title">Tic-Tac-Toe</h1>
          <p class="game-subtitle"></p>
        </div>
        <div id="turn-pill" class="turn-pill">
          <span class="turn-dot"></span>
          <span id="turn-label"></span>
        </div>
      </header>

      <div class="board-wrap">
        <div id="board" class="board ttt-board" aria-label="Tic-Tac-Toe board"></div>
      </div>

      <div class="score-strip" aria-label="Series score">
        <div class="score"><span class="label">X</span><span id="score-x" class="value">0</span></div>
        <div class="score"><span class="label" data-i18n="ttt.draws">Draws</span><span id="score-d" class="value">0</span></div>
        <div class="score"><span class="label">O</span><span id="score-o" class="value">0</span></div>
      </div>

      <div id="status" class="status-banner" hidden></div>

      <div class="row" style="justify-content: center; margin-top: 16px;">
        <button id="reset" type="button" class="btn btn-primary" data-i18n="btn.newRound">New round</button>
        <button id="reset-series" type="button" class="btn btn-ghost" data-i18n="btn.resetSeries">Reset series</button>
      </div>
    </main>

  </body>
</html>
