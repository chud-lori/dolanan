<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <title>Hangman — Dolanan</title>
    <meta name="description" content="Play Hangman offline. Guess the word in six wrong letters. English + Indonesian word lists built in." />
    <link rel="canonical" href="https://dolanan.lori.my.id/games/hangman/" />
    <meta property="og:title" content="Hangman — Dolanan" />
    <meta property="og:description" content="Offline Hangman with EN + ID word lists." />
    <meta property="og:image" content="https://dolanan.lori.my.id/og/hangman.png" />
    <meta property="og:url" content="https://dolanan.lori.my.id/games/hangman/" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/shared/ui.css" />
    <link rel="stylesheet" href="./game.css" />
    <script type="module" src="./game.js" defer></script>
  </head>
  <body>
    <a class="back-link" href="/" data-i18n="nav.back">← Back</a>

    <main class="game-shell">
      <header class="game-header">
        <div>
          <h1 class="game-title">Hangman</h1>
          <p class="game-subtitle"></p>
        </div>
        <div id="turn-pill" class="turn-pill">
          <span class="turn-dot red"></span>
          <span id="turn-label"></span>
        </div>
      </header>

      <section class="hm-gallows" aria-label="Hangman figure">
        <svg id="gallows" viewBox="0 0 200 220" role="img">
          <g stroke="#1e3a8a" stroke-width="4" fill="none" stroke-linecap="round">
            <line x1="20" y1="210" x2="100" y2="210" class="stage s1"/>
            <line x1="60" y1="210" x2="60" y2="20" class="stage s2"/>
            <line x1="60" y1="20" x2="140" y2="20" class="stage s3"/>
            <line x1="140" y1="20" x2="140" y2="40" class="stage s4"/>
          </g>
          <g stroke="#ef4444" stroke-width="3.5" fill="none" stroke-linecap="round">
            <circle cx="140" cy="60" r="20" class="part p1"/>
            <line x1="140" y1="80" x2="140" y2="140" class="part p2"/>
            <line x1="140" y1="100" x2="110" y2="120" class="part p3"/>
            <line x1="140" y1="100" x2="170" y2="120" class="part p4"/>
            <line x1="140" y1="140" x2="115" y2="180" class="part p5"/>
            <line x1="140" y1="140" x2="165" y2="180" class="part p6"/>
          </g>
        </svg>
      </section>

      <section class="hm-category">
        <span class="hm-category-label" id="cat-label"></span>
        <button type="button" id="cat-change" class="btn btn-ghost"></button>
      </section>

      <section class="hm-word" id="word" aria-label="Word"></section>

      <section class="hm-input" id="input-zone">
        <label for="guess-input" class="hm-input-label" id="guess-hint">Tap here to type</label>
        <input
          id="guess-input"
          class="hm-hidden-input"
          type="text"
          inputmode="text"
          autocapitalize="characters"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          maxlength="1"
          aria-label="Type a letter" />
        <div class="hm-tried" id="tried"></div>
      </section>

      <div id="status" class="status-banner" hidden></div>

      <div class="row" style="justify-content: center; margin-top: 16px;">
        <button id="reset" type="button" class="btn btn-primary" data-i18n="btn.newRound">New round</button>
      </div>
    </main>

  </body>
</html>
