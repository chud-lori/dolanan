<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Congklak">
  <rect width="64" height="64" rx="14" fill="#8b5e34"/>
  <!-- Board shape: a rounded horizontal bar -->
  <rect x="6" y="20" width="52" height="24" rx="12" fill="#6d4c2e" stroke="#3b2313" stroke-width="1.5"/>
  <!-- Stores at ends -->
  <ellipse cx="14" cy="32" rx="5" ry="9" fill="#4a3320"/>
  <ellipse cx="50" cy="32" rx="5" ry="9" fill="#4a3320"/>
  <!-- Top pits -->
  <circle cx="24" cy="27" r="3.5" fill="#4a3320"/>
  <circle cx="32" cy="27" r="3.5" fill="#4a3320"/>
  <circle cx="40" cy="27" r="3.5" fill="#4a3320"/>
  <!-- Bottom pits -->
  <circle cx="24" cy="37" r="3.5" fill="#4a3320"/>
  <circle cx="32" cy="37" r="3.5" fill="#4a3320"/>
  <circle cx="40" cy="37" r="3.5" fill="#4a3320"/>
  <!-- Seeds (golden dots) -->
  <g fill="#fbbf24">
    <circle cx="24" cy="27" r="1.5"/>
    <circle cx="32" cy="37" r="1.5"/>
    <circle cx="40" cy="27" r="1.5"/>
    <circle cx="14" cy="30" r="1.2"/>
    <circle cx="14" cy="34" r="1.2"/>
    <circle cx="50" cy="32" r="1.2"/>
  </g>
</svg>
