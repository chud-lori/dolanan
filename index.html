<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="color-scheme" content="light" />

    <title>Dolanan — Offline-first Party Games Hub</title>
    <meta
      name="description"
      content="Dolanan is a free, offline-first web app bundling casual local-multiplayer games — chess, ludo, connect four, werewolf, battleship, hangman and more. No ads, no accounts, works anywhere." />
    <meta
      name="keywords"
      content="party games, offline games, pwa games, local multiplayer, pass the phone games, chess, ludo, connect four, werewolf, battleship, hangman, javanese games, dolanan" />
    <meta name="author" content="Lori" />
    <link rel="canonical" href="https://dolanan.lori.my.id/" />

    <!-- Open Graph / link preview -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dolanan" />
    <meta property="og:title" content="Dolanan — Offline-first Party Games Hub" />
    <meta
      property="og:description"
      content="Ten casual local-multiplayer games in one installable web app. Chess, ludo, werewolf, connect four, and more — works offline, no accounts." />
    <meta property="og:url" content="https://dolanan.lori.my.id/" />
    <meta property="og:image" content="https://dolanan.lori.my.id/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="id_ID" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dolanan — Offline-first Party Games Hub" />
    <meta
      name="twitter:description"
      content="Ten casual local-multiplayer games in one installable web app. Works offline, no accounts." />
    <meta name="twitter:image" content="https://dolanan.lori.my.id/og-image.png" />

    <!-- JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Dolanan",
        "description": "Offline-first hub of casual local-multiplayer games.",
        "url": "https://dolanan.lori.my.id/",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": { "@type": "Person", "name": "Lori", "url": "https://profile.lori.my.id" }
      }
    </script>

    <!-- Icons -->
    <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/icons/icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/hub.css" />

    <script type="module" src="/hub.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <h1 class="logo">Dolanan</h1>
      <p class="tagline" data-i18n="hub.tagline">Casual games for hanging out with friends.</p>
      <div class="hub-controls">
        <div class="lang-seg" id="lang-seg" role="tablist" aria-label="Language">
          <button type="button" data-lang="en">EN</button>
          <button type="button" data-lang="id">ID</button>
        </div>
        <button type="button" id="install-btn" class="btn btn-primary" hidden data-i18n="hub.install">
          Install app
        </button>
      </div>
    </header>

    <main class="hub">
      <h2 id="games-heading" data-i18n="hub.games">Games</h2>
      <nav id="game-grid" class="game-grid" aria-label="Games">
        <!-- populated by hub.js -->
      </nav>

      <aside class="hub-sister">
        <a class="sister-card" href="https://ethok.lori.my.id" rel="noopener">
          <span class="sister-emoji" aria-hidden="true">🕵️</span>
          <span class="sister-text">
            <span class="sister-title">Ethok-Ethok</span>
            <span class="sister-blurb" data-i18n="hub.sisterBlurb">
              Social deduction party game — find the impostor.
            </span>
          </span>
          <span class="sister-arrow" aria-hidden="true">↗</span>
        </a>
      </aside>
    </main>

    <footer class="app-footer">
      <span data-i18n="credit.by">Created by</span>
      <a href="https://profile.lori.my.id" rel="noopener">Lori</a>
    </footer>
  </body>
</html>
